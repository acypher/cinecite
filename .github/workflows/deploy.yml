name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SCP
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }} "mkdir -p cinecite.acypher.com/dist/public"
          scp -i ~/.ssh/deploy_key -P 2222 ./dist/index.cjs ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}:cinecite.acypher.com/dist/
          scp -i ~/.ssh/deploy_key -P 2222 -r ./dist/public/* ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}:cinecite.acypher.com/dist/public/
