name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_USER: ${{ secrets.SFTP_USERNAME }}
      DEPLOY_HOST: ${{ secrets.SFTP_HOST }}
      # Absolute path on InMotion (site lives under /home/thekla5).
      REMOTE_DIST: /home/thekla5/cinecite.acypher.com/dist

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          touch ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # No ssh-keyscan: many hosts (including some InMotion configs) drop keyscan
          # probes after the banner. Host keys are recorded on first real ssh/rsync via
          # StrictHostKeyChecking=accept-new below.

      - name: Deploy via rsync
        run: |
          set -euo pipefail
          SSH_BASE=(ssh -i "$HOME/.ssh/deploy_key" -p 2222 -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30)
          REMOTE="${DEPLOY_USER}@${DEPLOY_HOST}"

          "${SSH_BASE[@]}" "$REMOTE" "mkdir -p '${REMOTE_DIST}/public'"

          RSYNC_SH="ssh -i $HOME/.ssh/deploy_key -p 2222 -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30"
          RSYNC=(rsync -avz --human-readable -e "$RSYNC_SH")

          # Server bundle
          "${RSYNC[@]}" ./dist/index.cjs "$REMOTE:${REMOTE_DIST}/"

          # Vite output: trailing slash on source copies *contents* into .../public/
          "${RSYNC[@]}" --delete ./dist/public/ "$REMOTE:${REMOTE_DIST}/public/"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -p 2222 -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "ls -la '${REMOTE_DIST}/' && ls -la '${REMOTE_DIST}/public/'"
